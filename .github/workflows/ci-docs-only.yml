---
name: "Rpm CI"
on:
  pull_request:
    branches: ['*']
    paths:
      - 'docs/**'
      - '.github/**'  # Added for testing purposes - remove in production

concurrency:
  group: ${{ github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-commits:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
          path: "pulp_rpm"
      - uses: "actions/setup-python@v5"
        with:
          python-version: "3.11"
      - name: "Install python dependencies"
        working-directory: "pulp_rpm"
        run: |
          echo ::group::PYDEPS
          pip install requests pygithub pyyaml
          echo ::endgroup::
      - name: "Check commit message"
        if: github.event_name == 'pull_request'
        working-directory: "pulp_rpm"
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_CONTEXT: "${{ github.event.pull_request.commits_url }}"
        run: |
          .github/workflows/scripts/check_commit.sh

  docs:
    uses: "./.github/workflows/docs.yml"

  lint:
    uses: "./.github/workflows/lint.yml"

  build:
    needs: "lint"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Skip - docs only changes"
        run: echo "Skipping build for docs-only changes"

  test:
    needs: "build"
    uses: "./.github/workflows/test-skip.yml"
    with:
      matrix_env: |
        [{"TEST": "pulp"}, {"TEST": "azure"}, {"TEST": "s3"}]

  ready-to-ship:
    # This is a dummy dependent task to have a single entry for the branch protection rules.
    runs-on: "ubuntu-latest"
    needs:
      - "check-commits"
      - "lint"
      - "test"
      - "docs"
    if: "always()"
    steps:
      - name: "Collect needed jobs results"
        working-directory: "."
        run: |
          echo '${{toJson(needs)}}' | jq -r 'to_entries[]|select(.value.result!="success")|.key + ": " + .value.result'
          echo '${{toJson(needs)}}' | jq -e 'to_entries|map(select(.value.result!="success"))|length == 0'
          echo "CI says: Looks good! (docs-only changes)"
